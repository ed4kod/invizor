{% extends "base.html" %}

{% block title %}Регистрация - Invizor{% endblock %}

{% block content %}
<div class="flex items-center justify-center py-12">
    <div class="max-w-md w-full mx-4">
        <!-- Заголовок -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-fastapi-green rounded-xl mb-6">
                <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-semibold text-gray-900 mb-2">Создать аккаунт</h1>
            <p class="text-gray-600">
                Присоединяйтесь к системе управления имуществом
            </p>
        </div>
        
        <!-- Форма регистрации -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-8">
            {% if error %}
            <div class="mb-6 bg-red-50 border border-red-200 rounded-lg p-4">
                <div class="flex items-center">
                    <svg class="w-5 h-5 text-red-500 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span class="text-red-700 text-sm font-medium">{{ error }}</span>
                </div>
            </div>
            {% endif %}
            
            <form action="/auth/register" method="POST" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Имя пользователя</label>
                    <input id="username" name="username" type="text" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-fastapi-green focus:border-fastapi-green transition-colors" 
                           placeholder="Введите имя пользователя">
                </div>
                
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input id="email" name="email" type="email" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-fastapi-green focus:border-fastapi-green transition-colors" 
                           placeholder="Введите email">
                </div>
                
                <div>
                    <label for="full_name" class="block text-sm font-medium text-gray-700 mb-2">Полное имя</label>
                    <input id="full_name" name="full_name" type="text" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-fastapi-green focus:border-fastapi-green transition-colors" 
                           placeholder="Введите полное имя">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Пароль</label>
                    <input id="password" name="password" type="password" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-fastapi-green focus:border-fastapi-green transition-colors" 
                           placeholder="Введите пароль">
                </div>

                <button type="submit" 
                        class="w-full bg-fastapi-green hover:bg-fastapi-green-dark text-white font-medium py-3 px-4 rounded-lg transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-fastapi-green focus:ring-offset-2">
                    Создать аккаунт
                </button>
            </form>
            
            <div class="mt-8 text-center">
                <p class="text-gray-600 text-sm">
                    Уже есть аккаунт? 
                    <a href="/auth/login" class="text-fastapi-green hover:text-fastapi-green-dark font-medium transition-colors">
                        Войти в систему
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
